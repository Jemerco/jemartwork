backend:
  name: git-gateway
  repo: Jemerco/jemartwork
  branch: main

media_folder: public/images
public_folder: /images

locale: pt

collections:

  # ── INFORMAÇÕES GERAIS ──
  - name: "geral"
    label: "⚙ Informações Gerais"
    files:

      - name: "policies"
        label: "Políticas / Policies"
        file: "_data/policies.json"
        fields:
          - { label: "Pagamento (PT)", name: "payment_pt", widget: "text", required: false }
          - { label: "Payment (EN)", name: "payment_en", widget: "text", required: false }
          - { label: "Prazo (PT)", name: "timeline_pt", widget: "text", required: false }
          - { label: "Timeline (EN)", name: "timeline_en", widget: "text", required: false }
          - { label: "WIPs e Aprovação (PT)", name: "wips_pt", widget: "text", required: false }
          - { label: "WIPs & Approval (EN)", name: "wips_en", widget: "text", required: false }

      - name: "sobre" 
        label: "Sobre / About"
        file: "_data/sobre.json"
        fields:
          - { label: "Nome", name: "nome", widget: "string", required: false }
          - { label: "Bio em Português", name: "bio_pt", widget: "text", required: false }
          - { label: "Bio em Inglês", name: "bio_en", widget: "text", required: false }
          - label: "Tags"
            name: "tags"
            widget: "list"
            required: false
            field: { label: "Tag", name: "tag", widget: "string", required: false }

      - name: "contato"
        label: "Contato & Redes Sociais"
        file: "_data/contato.json"
        fields:
          - { label: "E-mail de contato", name: "email", widget: "string", required: false, hint: "Ex: jemartwork@gmail.com" }
          - { label: "Instagram (usuário)", name: "instagram", widget: "string", required: false, hint: "Ex: 0jem0 (sem o @)" }
          - { label: "Link ArtStation", name: "artstation", widget: "string", required: false }
          - { label: "Link DeviantArt", name: "deviantart", widget: "string", required: false }
          - { label: "Link Redbubble", name: "redbubble", widget: "string", required: false }
          - { label: "Link Montink (loja BR)", name: "montink", widget: "string", required: false }

  # ── PREÇOS ──
  - name: "precos"
    label: "💰 Preços"
    files:

      - name: "personagem_brl"
        label: "Personagem — Reais (BRL)"
        file: "_data/precos_personagem_brl.json"
        fields:
          - label: "Sketch"
            name: sketch
            widget: object
            fields:
              - { label: "Busto", name: busto, widget: number , required: false}
              - { label: "Meio corpo", name: meio, widget: number , required: false}
              - { label: "Corpo inteiro", name: inteiro, widget: number , required: false}
          - label: "Lineart + Cores Base"
            name: cores
            widget: object
            fields:
              - { label: "Busto", name: busto, widget: number , required: false}
              - { label: "Meio corpo", name: meio, widget: number , required: false}
              - { label: "Corpo inteiro", name: inteiro, widget: number , required: false}
          - label: "Flat Shading / 2D Coloring"
            name: flat
            widget: object
            fields:
              - { label: "Busto", name: busto, widget: number , required: false}
              - { label: "Meio corpo", name: meio, widget: number , required: false}
              - { label: "Corpo inteiro", name: inteiro, widget: number , required: false}
          - label: "Full Render / Full Color"
            name: full
            widget: object
            fields:
              - { label: "Busto", name: busto, widget: number , required: false}
              - { label: "Meio corpo", name: meio, widget: number , required: false}
              - { label: "Corpo inteiro", name: inteiro, widget: number , required: false}

      - name: "personagem_usd"
        label: "Personagem — Dólar (USD)"
        file: "_data/precos_personagem_usd.json"
        fields:
          - label: "Sketch"
            name: sketch
            widget: object
            fields:
              - { label: "Bust", name: busto, widget: number , required: false}
              - { label: "Half body", name: meio, widget: number , required: false}
              - { label: "Full body", name: inteiro, widget: number , required: false}
          - label: "Lineart + Base Color"
            name: cores
            widget: object
            fields:
              - { label: "Bust", name: busto, widget: number , required: false}
              - { label: "Half body", name: meio, widget: number , required: false}
              - { label: "Full body", name: inteiro, widget: number , required: false}
          - label: "2D Coloring"
            name: flat
            widget: object
            fields:
              - { label: "Bust", name: busto, widget: number , required: false}
              - { label: "Half body", name: meio, widget: number , required: false}
              - { label: "Full body", name: inteiro, widget: number , required: false}
          - label: "Full Color"
            name: full
            widget: object
            fields:
              - { label: "Bust", name: busto, widget: number , required: false}
              - { label: "Half body", name: meio, widget: number , required: false}
              - { label: "Full body", name: inteiro, widget: number , required: false}

      - name: "outros_brl"
        label: "Outros Serviços — Reais (BRL)"
        file: "_data/precos_outros_brl.json"
        fields:
          - { label: "Capa de Livro (base)", name: capa, widget: number , required: false}
          - label: "Editorial"
            name: editorial
            widget: object
            fields:
              - { label: "Pequena", name: pequena, widget: number , required: false}
              - { label: "Média", name: media, widget: number , required: false}
              - { label: "Página inteira P&B", name: pb, widget: number , required: false}
              - { label: "Página inteira Colorida", name: colorida, widget: number , required: false}
          - label: "Quadrinho (por página)"
            name: quadrinho
            widget: object
            fields:
              - { label: "Preto e branco", name: pb, widget: number , required: false}
              - { label: "Colorido", name: color, widget: number , required: false}
          - label: "Folha de Ref — Lineart"
            name: folha_bw
            widget: object
            fields:
              - { label: "1 personagem + 3 expressões", name: expr, widget: number , required: false}
              - { label: "Rosto extra", name: rosto, widget: number , required: false}
              - { label: "Pose extra", name: pose, widget: number , required: false}
          - label: "Folha de Ref — Colorida"
            name: folha_color
            widget: object
            fields:
              - { label: "1 personagem + 3 expressões", name: expr, widget: number , required: false}
              - { label: "Rosto extra", name: rosto, widget: number , required: false}
              - { label: "Pose extra", name: pose, widget: number , required: false}

      - name: "outros_usd"
        label: "Outros Serviços — Dólar (USD)"
        file: "_data/precos_outros_usd.json"
        fields:
          - { label: "Book Cover (base)", name: capa, widget: number , required: false}
          - label: "Editorial"
            name: editorial
            widget: object
            fields:
              - { label: "Small", name: pequena, widget: number , required: false}
              - { label: "Medium", name: media, widget: number , required: false}
              - { label: "Full page B&W", name: pb, widget: number , required: false}
              - { label: "Full page Color", name: colorida, widget: number , required: false}
          - label: "Comic page (per page)"
            name: quadrinho
            widget: object
            fields:
              - { label: "B&W", name: pb, widget: number , required: false}
              - { label: "Color", name: color, widget: number , required: false}
          - label: "Ref Sheet — B&W"
            name: folha_bw
            widget: object
            fields:
              - { label: "1 char + 3 expressions", name: expr, widget: number , required: false}
              - { label: "Extra face", name: rosto, widget: number , required: false}
              - { label: "Extra pose", name: pose, widget: number , required: false}
          - label: "Ref Sheet — Colored"
            name: folha_color
            widget: object
            fields:
              - { label: "1 char + 3 expressions", name: expr, widget: number , required: false}
              - { label: "Extra face", name: rosto, widget: number , required: false}
              - { label: "Extra pose", name: pose, widget: number , required: false}

      - name: "extras"
        label: "Adicionais / Add-ons"
        file: "_data/precos_extras.json"
        fields:
          - label: "Reais (BRL)"
            name: brl
            widget: object
            fields:
              - { label: "Detalhes complexos", name: detalhes, widget: number , required: false}
              - { label: "Cenário simples", name: cen_s, widget: number , required: false}
              - { label: "Cenário complexo", name: cen_c, widget: number , required: false}
              - { label: "Animal pequeno", name: ani_p, widget: number , required: false}
              - { label: "Animal grande", name: ani_g, widget: number , required: false}
          - label: "Dólar (USD)"
            name: usd
            widget: object
            fields:
              - { label: "Complex details", name: detalhes, widget: number , required: false}
              - { label: "Simple background", name: cen_s, widget: number , required: false}
              - { label: "Complex background", name: cen_c, widget: number , required: false}
              - { label: "Small animal", name: ani_p, widget: number , required: false}
              - { label: "Large animal", name: ani_g, widget: number , required: false}

  # ── PORTFÓLIO ──
  - name: "portfolio"
    label: "🎨 Portfólio"
    files:
      - name: "obras"
        label: "Obras do Portfólio"
        file: "_data/portfolio.json"
        fields:
          - name: "fanart"
            label: "Fanarts"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "title", widget: "string", required: false }
              - { label: "Descrição / Série", name: "meta", widget: "string", required: false, hint: "Ex: ACOTAR · Full Color" }
              - { label: "Imagem", name: "img", widget: "image", required: false }
          - name: "capa"
            label: "Book Covers / Capas de Livro"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "title", widget: "string", required: false }
              - { label: "Descrição / Série", name: "meta", widget: "string", required: false, hint: "Ex: Princess of Souls · Full Color" }
              - { label: "Imagem", name: "img", widget: "image", required: false }
          - name: "editorial"
            label: "Editorial"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "title", widget: "string", required: false }
              - { label: "Descrição / Série", name: "meta", widget: "string", required: false }
              - { label: "Imagem", name: "img", widget: "image", required: false }
          - name: "comic"
            label: "Comics / Quadrinhos"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "title", widget: "string", required: false }
              - { label: "Descrição / Série", name: "meta", widget: "string", required: false }
              - { label: "Imagem", name: "img", widget: "image", required: false }
          - name: "original"
            label: "Original"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "title", widget: "string", required: false }
              - { label: "Descrição / Série", name: "meta", widget: "string", required: false }
              - { label: "Imagem", name: "img", widget: "image", required: false }
          - name: "landscape"
            label: "Landscape / Paisagem"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "title", widget: "string", required: false }
              - { label: "Descrição / Série", name: "meta", widget: "string", required: false }
              - { label: "Imagem", name: "img", widget: "image", required: false }
          - name: "character_sheet"
            label: "Character Sheet / Folha de Personagem"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "title", widget: "string", required: false }
              - { label: "Descrição / Série", name: "meta", widget: "string", required: false }
              - { label: "Imagem", name: "img", widget: "image", required: false }

  # ── LOJA ──
  - name: "loja"
    label: "🛍 Loja"
    files:

      - name: "produtos_int"
        label: "Produtos Internacionais (Redbubble)"
        file: "_data/loja_internacional.json"
        fields:
          - name: produtos
            label: Produtos
            widget: list
            fields:
              - { label: "Nome da obra", name: name, widget: string , required: false}
              - { label: "Preço (ex: from $14)", name: price, widget: string , required: false}
              - { label: "Link Redbubble", name: link, widget: string , required: false}
              - { label: "Imagem", name: img, widget: image, required: false }

      - name: "produtos_br"
        label: "Produtos Brasil (Montink)"
        file: "_data/loja_brasil.json"
        fields:
          - name: produtos
            label: Produtos
            widget: list
            fields:
              - { label: "Nome da obra", name: name, widget: string , required: false}
              - { label: "Preço (ex: a partir de R$39)", name: price, widget: string , required: false}
              - { label: "Link Montink", name: link, widget: string , required: false}
              - { label: "Imagem", name: img, widget: image, required: false }
